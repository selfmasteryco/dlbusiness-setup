    <script>
        function openModal() {
            document.getElementById('registrationModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
        }

        function closeModal() {
            document.getElementById('registrationModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        window.onclick = function(event) {
            const modal = document.getElementById('registrationModal');
            if (event.target === modal) {
                closeModal();
            }
        }

        async function handleSubmit(event) {
            event.preventDefault();
            
            const submitButton = document.getElementById('submitButton');
            const errorMessage = document.getElementById('errorMessage');
            
            submitButton.disabled = true;
            submitButton.textContent = 'RESERVING YOUR SEAT...';
            errorMessage.style.display = 'none';
            
            const formData = {
                firstName: document.getElementById('firstName').value.trim(),
                lastName: document.getElementById('lastName').value.trim(),
                email: document.getElementById('email').value.trim(),
                phone: document.getElementById('phone').value.trim()
            };

            try {
                const response = await fetch('/api/nextversion-register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    window.location.href = '/nextversion-conf';
                } else {
                    throw new Error(data.message || 'Registration failed');
                }
            } catch (error) {
                console.error('Registration error:', error);
                errorMessage.textContent = 'Something went wrong. Please try again or contact support.';
                errorMessage.style.display = 'block';
                submitButton.disabled = false;
                submitButton.textContent = 'RESERVE MY FREE SEAT';
            }
        }
    </script>
